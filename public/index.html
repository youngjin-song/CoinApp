<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f39c12">
    <meta name="description" content="코인 채굴하고 게임하고 보상받자!">
    <title>CoinMiner - 코인 채굴 앱</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6321935671066738"
        crossorigin="anonymous"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <!-- 로그인 UI -->
    <div id="authContainer"></div>

    <div class="container">
        <header>
            <h1 data-i18n="appName">CoinMiner</h1>
            <p class="subtitle" data-i18n="subtitle">Web-based Cryptocurrency Mining</p>
            <a href="/games.html" target="_blank" class="games-link" data-i18n="gamesLink">🎮 미니게임으로 코인 벌기</a>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">⛏️</div>
                <div class="stat-info">
                    <span class="stat-label" data-i18n="miningStatus">채굴 상태</span>
                    <span class="stat-value" id="miningStatus" data-i18n="waiting">대기 중</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-info">
                    <span class="stat-label" data-i18n="myCoins">내 코인</span>
                    <span class="stat-value" id="myCoins">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-info">
                    <span class="stat-label" data-i18n="hashRate">해시레이트</span>
                    <span class="stat-value" id="hashRate">0 H/s</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔗</div>
                <div class="stat-info">
                    <span class="stat-label" data-i18n="totalBlocks">총 블록</span>
                    <span class="stat-value" id="totalBlocks">0</span>
                </div>
            </div>
        </div>

        <div class="mining-section">
            <div class="mining-control">
                <button id="mineBtn" class="mine-btn">
                    <span class="btn-icon">⛏️</span>
                    <span class="btn-text" data-i18n="startMining">채굴 시작</span>
                </button>
                <div class="difficulty-display">
                    <span data-i18n="difficulty">난이도</span>: <span id="difficulty">4</span>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-info">
                    <span><span data-i18n="nonce">Nonce</span>: <span id="currentNonce">0</span></span>
                    <span><span data-i18n="attempts">시도</span>: <span id="attempts">0</span></span>
                </div>
            </div>

            <div class="hash-display">
                <label><span data-i18n="currentHash">현재 해시</span>:</label>
                <code id="currentHash">-</code>
            </div>
        </div>

        <div class="network-section">
            <h2 data-i18n="networkInfo">네트워크 정보</h2>
            <div class="network-stats">
                <div class="network-stat">
                    <span class="label" data-i18n="connectedMiners">접속 채굴자</span>:
                    <span class="value" id="totalMiners">0</span>
                </div>
                <div class="network-stat">
                    <span class="label" data-i18n="totalMinedCoins">총 채굴 코인</span>:
                    <span class="value" id="totalMinedCoins">0</span>
                </div>
                <div class="network-stat">
                    <span class="label" data-i18n="myBlocks">내 채굴 블록</span>:
                    <span class="value" id="myBlocks">0</span>
                </div>
            </div>
        </div>

        <div class="blocks-section">
            <h2 data-i18n="recentBlocks">최근 블록</h2>
            <div class="blocks-list" id="blocksList">
                <!-- 블록들이 여기에 추가됨 -->
            </div>
        </div>

        <div class="log-section">
            <h2 data-i18n="miningLog">채굴 로그</h2>
            <div class="log-container" id="logContainer">
                <!-- 로그가 여기에 추가됨 -->
            </div>
        </div>

        <!-- 리더보드 -->
        <div class="leaderboard">
            <h2 data-i18n="leaderboard">🏆 코인 랭킹 TOP 10</h2>
            <div class="leaderboard-list" id="leaderboardList">
                <p class="no-data" data-i18n="loading">로딩 중...</p>
            </div>
        </div>

        <!-- 친구 초대 버튼 -->
        <div class="referral-section">
            <button onclick="showReferralStats()" class="referral-btn" data-i18n="referralBtn">
                👥 친구 초대하고 50코인 받기
            </button>
        </div>

        <!-- 면책 조항 -->
        <footer class="disclaimer">
            <p data-i18n="disclaimer1">본 서비스는 교육/오락 목적의 채굴 시뮬레이션입니다.</p>
            <p data-i18n="disclaimer2">획득한 코인은 실제 암호화폐가 아니며 현금 가치가 없습니다.</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="i18n.js"></script>
    <script src="auth.js"></script>
    <script src="daily.js"></script>
    <script src="referral.js"></script>
    <script src="leaderboard.js"></script>
    <script src="miner.js"></script>
    <script>
        // 기존 Service Worker 제거 (캐시 문제 해결)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
</body>
</html>
